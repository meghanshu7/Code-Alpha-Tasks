<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopSphere | Register</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>
  <div id="navbar"></div>
  <main class="auth-shell">
    <section class="auth-layout">
      <div class="auth-visual">
        <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&w=1400&q=80" alt="Modern shopping store interior">
        <div class="auth-visual-copy">
          <span>Join ShopSphere</span>
          <h2>Create your account and start shopping smarter.</h2>
        </div>
      </div>
      <form class="auth-box" data-mode="register">
        <span class="eyebrow">Register</span>
        <h1>Create Account</h1>
        <p class="auth-subtitle">Set up your profile to save wishlist items, addresses, cart products, and orders.</p>
        <div class="field">
          <label>Name</label>
          <input name="name" placeholder="Your full name" required>
        </div>
        <div class="field">
          <label>Email</label>
          <input name="email" type="email" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label>Phone</label>
          <input name="phone" placeholder="Your phone number" required>
        </div>
        <div class="field">
          <label>Password</label>
          <input name="password" type="password" minlength="6" placeholder="At least 6 characters" required>
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <input name="confirmPassword" type="password" minlength="6" placeholder="Repeat your password" required>
        </div>
        <button class="btn full-width">Register</button>
        <p class="auth-switch">Already registered? <a href="/pages/login.html">Login</a></p>
      </form>
    </section>
  </main>
  <div id="footer"></div>
  <script type="module" src="../js/auth.js"></script>
</body>
</html>
