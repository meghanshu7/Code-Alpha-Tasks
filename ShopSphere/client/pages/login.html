<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopSphere | Login</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>
  <div id="navbar"></div>
  <main class="auth-shell">
    <section class="auth-layout">
      <div class="auth-visual">
        <img src="https://images.unsplash.com/photo-1555529669-e69e7aa0ba9a?auto=format&fit=crop&w=1400&q=80" alt="ShopSphere products display">
        <div class="auth-visual-copy">
          <span>ShopSphere</span>
          <h2>Everything you need, in one clean store.</h2>
        </div>
      </div>
      <form class="auth-box" data-mode="login">
        <span class="eyebrow">Login</span>
        <h1>Welcome Back</h1>
        <p class="auth-subtitle">Sign in to browse products, manage your cart, and track your orders.</p>
        <div class="field">
          <label>Email</label>
          <input name="email" type="email" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label>Password</label>
          <input name="password" type="password" placeholder="Enter your password" required>
        </div>
        <div class="form-actions">
          <label class="inline-check"><input type="checkbox" name="remember"> Remember Me</label>
          <a href="/pages/login.html">Forgot Password</a>
        </div>
        <button class="btn full-width">Login</button>
        <p class="auth-switch">New here? <a href="/pages/register.html">Create an account</a></p>
      </form>
    </section>
  </main>
  <div id="footer"></div>
  <script type="module" src="../js/auth.js"></script>
</body>
</html>
